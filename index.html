<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Ajustar Valores Sintegra (Registro 74)</title>
<link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="container">
        <h2>Ajuste do Registro 74 (Sintegra)</h2>
        <p>Selecione o seu arquivo txt original. O sistema irá calcular a soma atual e alterar os valores do produto (registro 74) proporcionalmente para atingir a <strong>Soma Desejada</strong>.</p>
        
        <input type="file" id="fileInput" accept=".txt">

        <div class="form-group">
            <label for="somaOriginal">Soma Original do Arquivo (R$):</label>
            <input type="text" id="somaOriginal" readonly placeholder="Aguardando seleção do arquivo...">
        </div>

        <div class="form-group">
            <label for="somaDesejada">Soma Desejada (R$):</label>
            <input type="text" id="somaDesejada" placeholder="Ex: R$ 53.086,14">
        </div>

        <button onclick="processarArquivo()">Processar e Baixar Novo Arquivo</button>
    </div>

    <script src="./js/script.js"></script>
</body>
</html>
